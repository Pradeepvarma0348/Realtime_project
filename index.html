<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flavoro RESTAURANT</title>
    <link rel="stylesheet" href="./style.css" </head>

<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <img src="./assets/logo.png" alt="Flavaro Logo" />
            </div>
            <ul class="links">
                <li class="link"><a href="#">Home</a></li>
                <li class="link"><a href="#">About Us</a></li>
                <li class="link"><a href="#">Menu</a></li>
                <li class="link"><a href="#">Specials</a></li>
                <li class="link"><a href="#">Gallery</a></li>
                <li class="link"><a href="#">Blog</a></li>
                <li class="link"><a href="#">Contact</a></li>
            </ul>
            <div class="action-button">
                <button class="action-button-btn">Book a Table</button>
            </div>
        </header>
        <div class="banner">
            <div class="welcome-flavoro">
                <h1 class="parisienne-regular">Welcome to Flavoro</h1>
            </div>
            <div class="tagline">
                <h2>
                    Good Food,
                </h2>
                <h2>Greate Moments.</h2>
            </div>
            <div class="banner-text">
                <div class="text">
                    <p>Experience the perfect blend of taste, ambience and hospitality. Every
                        dish is creafted with love and the freshest ingredients.
                    </p>
                </div>
                <div class="buttons">
                    <button class="explore-button-btn">Explore Menu</button>
                    <button class="action-button-btn">Book a Table</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
